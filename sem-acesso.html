<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SGP - Aguardando liberacao</title>
    <script type="module" src="auth.js?v=20260608-5"></script>
    <link rel="stylesheet" href="brand.css?v=20260608-1" />
    <style>
      :root {
        --bg: #f4fbff;
        --panel: #ffffff;
        --border: #cfe2ee;
        --text: #102033;
        --muted: #567086;
        --green: #009c67;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgba(32, 199, 123, 0.13), transparent 28%),
          linear-gradient(135deg, #f4fbff 0%, #ffffff 46%, #eef8f4 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(920px, 100%);
        min-height: 100vh;
        margin: 0 auto;
        padding: 32px 22px;
        display: grid;
        align-content: center;
        gap: 22px;
      }

      header {
        display: grid;
        gap: 10px;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .panel {
        max-width: 640px;
        padding: 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 18px 42px rgba(20, 75, 110, 0.1);
      }

      .panel p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.6;
      }

      .status-pill {
        display: inline-flex;
        width: fit-content;
        min-height: 34px;
        align-items: center;
        margin-bottom: 14px;
        padding: 0 10px;
        border: 1px solid rgba(0, 156, 103, 0.24);
        border-radius: 999px;
        color: #00764e;
        background: rgba(0, 156, 103, 0.1);
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <a class="uni-brand uni-brand--login" href="index.html" aria-label="Uni Internet">
          <img src="logo.png" alt="Uni Internet" />
        </a>
        <p class="eyebrow">SGP - Sistema Gestao do Suporte</p>
        <h1>Aguardando liberacao de cargo</h1>
      </header>

      <section class="panel">
        <span class="status-pill">Viewer</span>
        <p>
          Seu acesso foi criado, mas ainda nao existe uma dashboard liberada para este cadastro.
          Aguarde o Administrador definir seu cargo no painel de Usuarios e cargos.
        </p>
      </section>
    </main>
  </body>
</html>
